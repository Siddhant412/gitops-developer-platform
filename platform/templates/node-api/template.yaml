apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: node-api
  title: Node API
  description: Scaffold a Fastify-based Node.js API with TechDocs, CI, Docker, and Kustomize overlays.
  tags:
    - recommended
    - node
    - api
    - golden-path
spec:
  owner: group:default/platform-team
  type: service
  parameters:
    - title: Service Metadata
      required:
        - name
        - description
        - owner
        - system
      properties:
        name:
          title: Service name
          type: string
          description: Lowercase kebab-case identifier used across the repo, catalog, and Kubernetes resources.
          pattern: '^[a-z][a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Short summary of the service responsibility.
        owner:
          title: Owner
          type: string
          description: Team responsible for this service.
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        system:
          title: System
          type: string
          description: Higher-level system the service belongs to.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System
        port:
          title: Service port
          type: integer
          default: 7000
          minimum: 1024
          maximum: 65535
    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub repository
          type: string
          description: Destination repository for the generated service.
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-base
      name: Fetch service skeleton
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutTemplating:
          - .github/workflows/*
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          port: ${{ parameters.port }}
          repoOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
